<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Practice Arena | CodeLearning</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code&family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>{ Code_Hub }</h2>
            <button id="toggle-btn" class="toggle-btn">☰</button>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Hub</a></li>
            <li><a href="practice.html" class="active neon-text">Practice Arena</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <header>
            <h1>The Arena</h1>
            <p>Generate context-aware coding challenges driven by AI.</p>
        </header>

        <section class="config-panel" style="max-width: 600px;">
            <div class="control-group">
                <label>Select Subject Domain</label>
                <select id="subject-select">
                    <option value="Data Structures & Algorithms">Data Structures & Algorithms</option>
                    <option value="Git & Version Control">Git & Version Control</option>
                    <option value="Bash & Terminal">Bash & Terminal</option>
                    <option value="Memory Management (C/Rust)">Memory Management (C/Rust)</option>
                </select>
            </div>

            <div class="control-group">
                <label>Difficulty: <span id="diff-label">Intermediate</span></label>
                <input type="range" id="difficulty-slider" min="1" max="3" value="2" oninput="document.getElementById('diff-label').innerText = ['Beginner', 'Intermediate', 'Advanced'][this.value - 1]">
            </div>

            <button id="generate-btn" class="primary">Generate Challenge Payload</button>
        </section>

        <section id="arena-output">
            System ready. Awaiting parameters.
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
